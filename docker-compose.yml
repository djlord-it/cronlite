services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cronlite
      POSTGRES_USER: cronlite
      POSTGRES_PASSWORD: cronlite
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./schema/002_add_indexes.sql:/docker-entrypoint-initdb.d/002_add_indexes.sql
      - ./schema/004_agent_platform.sql:/docker-entrypoint-initdb.d/004_agent_platform.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cronlite"]
      interval: 2s
      timeout: 5s
      retries: 5

  cronlite:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://cronlite:cronlite@postgres:5432/cronlite?sslmode=disable
      HTTP_ADDR: ":8080"
      TICK_INTERVAL: "5s"
      DISPATCHER_WORKERS: "4"
      RECONCILE_ENABLED: "true"
      METRICS_ENABLED: "true"
    ports:
      - "8080:8080"

volumes:
  pgdata:
