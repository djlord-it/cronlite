x-cronlite-env: &cronlite-env
  DATABASE_URL: postgres://cronlite:cronlite@postgres:5432/cronlite?sslmode=disable
  DISPATCH_MODE: db
  DISPATCHER_WORKERS: "2"
  DB_POLL_INTERVAL: 500ms
  TICK_INTERVAL: 10s
  LEADER_LOCK_KEY: "728379"
  LEADER_RETRY_INTERVAL: 3s
  LEADER_HEARTBEAT_INTERVAL: 1s
  METRICS_ENABLED: "true"
  RECONCILE_ENABLED: "true"
  RECONCILE_INTERVAL: 30s
  API_KEY: ha-test-key

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cronlite
      POSTGRES_USER: cronlite
      POSTGRES_PASSWORD: cronlite
    volumes:
      - ./schema/001_initial.sql:/docker-entrypoint-initdb.d/001_initial.sql
      - ./schema/002_add_indexes.sql:/docker-entrypoint-initdb.d/002_add_indexes.sql
      - ./schema/003_add_claimed_at.sql:/docker-entrypoint-initdb.d/003_add_claimed_at.sql
      - ./schema/004_agent_platform.sql:/docker-entrypoint-initdb.d/004_agent_platform.sql
      - ./schema/005_drop_scopes.sql:/docker-entrypoint-initdb.d/005_drop_scopes.sql
      - ./schema/006_add_claimed_at_index.sql:/docker-entrypoint-initdb.d/006_add_claimed_at_index.sql
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cronlite"]
      interval: 2s
      timeout: 5s
      retries: 10

  webhook-receiver:
    build: ./tools/webhook-receiver
    ports:
      - "9090:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 2s
      timeout: 3s
      retries: 5

  cronlite_1:
    build:
      context: .
      args:
        RACE_ENABLED: "${RACE_ENABLED:-0}"
    container_name: cronlite_1
    depends_on:
      postgres:
        condition: service_healthy
      webhook-receiver:
        condition: service_healthy
    environment:
      <<: *cronlite-env
      HTTP_ADDR: ":8080"
    ports:
      - "8081:8080"

  cronlite_2:
    build:
      context: .
      args:
        RACE_ENABLED: "${RACE_ENABLED:-0}"
    container_name: cronlite_2
    depends_on:
      postgres:
        condition: service_healthy
      webhook-receiver:
        condition: service_healthy
    environment:
      <<: *cronlite-env
      HTTP_ADDR: ":8080"
    ports:
      - "8082:8080"

  cronlite_3:
    build:
      context: .
      args:
        RACE_ENABLED: "${RACE_ENABLED:-0}"
    container_name: cronlite_3
    depends_on:
      postgres:
        condition: service_healthy
      webhook-receiver:
        condition: service_healthy
    environment:
      <<: *cronlite-env
      HTTP_ADDR: ":8080"
    ports:
      - "8083:8080"
